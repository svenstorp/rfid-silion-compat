name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cargo check
        run: cargo check

      - name: Cargo fmt (lint)
        run: cargo fmt --all -- --check

      - name: Cargo test (library)
        run: cargo test --lib

      - name: Cargo check examples (serial)
        run: cargo check --features serial --examples

      - name: Cargo check wasm feature set
        run: cargo check --target wasm32-unknown-unknown --features web-serial

  npm-package:
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build npm package
        run: ./scripts/build-npm-package.sh

      - name: Install web example dependencies
        run: pnpm install --frozen-lockfile
        working-directory: examples/web

      - name: Check web example app
        run: |
          pnpm run check
          pnpm run build
        working-directory: examples/web
